# ============================================================
# zayo-platform-ai — Helm values (prod)
# Platform owns the chart. App team owns this file only.
#
# CI pipeline updates image.tag on every successful deploy.
# ArgoCD watches this file and syncs to EKS automatically.
# ============================================================

replicaCount: 1

image:
  repository: "501149494381.dkr.ecr.us-east-1.amazonaws.com/zayo-poc/zayo-platform-ai"
  tag: "v1.0.0-e5759234"    # ← CI updates this on every deploy
  pullPolicy: IfNotPresent

namespace: platform-ai

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

# ── Datadog APM ───────────────────────────────────────────────
# dd-trace baked into Docker image. Vars set here → EKS env vars.
datadog:
  service: "zayo-platform-ai"
  env: "prod"
  logsInjection: true
  profiling: false
  apm: true

# ── Resource limits ───────────────────────────────────────────
resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

# ── Health probes ─────────────────────────────────────────────
livenessProbe:
  httpGet:
    path: /api/v1/health
    port: 8000
  initialDelaySeconds: 45
  periodSeconds: 15
  failureThreshold: 3
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /api/v1/health
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 5

# ── Autoscaling ───────────────────────────────────────────────
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# ── ServiceAccount with IRSA ──────────────────────────────────
# Allows the pod to access AWS Secrets Manager via IRSA (no static keys)
serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::501149494381:role/zayo-platform-ai-pod-role"

# ── Ingress ───────────────────────────────────────────────────
ingress:
  enabled: false
  className: "alb"
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /api/v1/health
  hosts:
    - host: "zayo-platform-ai.internal.zayo.com"
      paths:
        - path: /
          pathType: Prefix

# ── Rolling update (zero downtime) ───────────────────────────
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# ── Pod disruption budget ─────────────────────────────────────
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# ── Anti-affinity (spread pods across AZs) ───────────────────
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: topology.kubernetes.io/zone
          labelSelector:
            matchLabels:
              app: zayo-platform-ai
