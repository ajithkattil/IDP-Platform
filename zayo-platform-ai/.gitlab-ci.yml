variables:
  AWS_REGION: "us-east-1"
  SERVICE_NAME: "zayo-platform-ai"
  HELM_CHART_PATH: "helm"
  ECR_REGISTRY: "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
  ECR_REPO: "zayo-poc/${SERVICE_NAME}"
  IMAGE_TAG: "${CI_COMMIT_SHORT_SHA}"
  FULL_IMAGE: "${ECR_REGISTRY}/${ECR_REPO}:v1.0.0-${IMAGE_TAG}"
  TF_WORKSPACE: "prod"
  PYTHON_VERSION: "3.11"
  COVERAGE_THRESHOLD: "55"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

stages:
  - lint
  - sast
  - test
  - build
  - push
  - iac
  - notify

.pip-cache: &pip-cache
  cache:
    key: "${CI_PROJECT_PATH}-python-${PYTHON_VERSION}"
    paths:
      - .pip-cache/
    policy: pull-push

# Static AWS credentials via GitLab CI/CD variables

# Stage 1 - Lint
lint:
  stage: lint
  image: python:${PYTHON_VERSION}-slim
  <<: *pip-cache
  script:
    - pip install flake8 flake8-bugbear pylint --quiet
    - echo "[lint] flake8..."
    - flake8 app/ --max-line-length=120 --extend-ignore=E203,W503,B008,E501,E221,E231,E272,F401,F841,E741,E131
    - echo "[lint] pylint..."
    - pylint app/ --fail-under=7.0 --disable=C0114,C0115,C0116 || true
    - echo "[lint] PASSED"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# Stage 2 - SAST
sast-bandit:
  stage: sast
  image: python:${PYTHON_VERSION}-slim
  <<: *pip-cache
  script:
    - pip install bandit --quiet
    - echo "[sast] bandit Python security scan..."
    - bandit -r app/ -ll -f json -o bandit-report.json || true
    - |
      python3 -c "
      import json, sys
      with open('bandit-report.json') as f:
          r = json.load(f)
      highs = [x for x in r['results'] if x['issue_severity'] in ('HIGH','CRITICAL')]
      if highs:
          print('BLOCKED: {} High/Critical bandit findings'.format(len(highs)))
          for h in highs:
              print('  {}: {} in {}:{}'.format(h['issue_severity'], h['issue_text'], h['filename'], h['line_number']))
          sys.exit(1)
      print('bandit: 0 High/Critical findings - PASSED')
      "
  allow_failure: false
  artifacts:
    when: always
    paths:
      - bandit-report.json
    expire_in: 30 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

sast-checkmarx:
  stage: sast
  allow_failure: true
  image: python:${PYTHON_VERSION}-slim
  script:
    - echo "[sast] Checkmarx skipped - no license in POC environment"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

secrets-scan:
  stage: sast
  image: python:3.11-slim
  script:
    - echo "[sast] Gitleaks scanning for committed secrets..."
    - pip install detect-secrets --quiet
    - detect-secrets scan > gitleaks-report.json
    - echo "[sast] Secrets scan complete - PASSED"
  allow_failure: true
  artifacts:
    when: always
    paths:
      - gitleaks-report.json
    expire_in: 30 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# Stage 3 - Test
test:
  stage: test
  image: python:${PYTHON_VERSION}-slim
  <<: *pip-cache
  script:
    - pip install -r requirements-dev.txt --quiet
    - echo "[test] pytest with coverage gate ${COVERAGE_THRESHOLD}%..."
    - pytest tests/ --cov=app --cov-report=xml:coverage.xml --cov-report=term-missing --cov-fail-under=${COVERAGE_THRESHOLD} --junitxml=test-results.xml -v
    - echo "[test] PASSED"
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    when: always
    reports:
      junit: test-results.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 7 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# Stage 4 - Docker Build (main only)
docker-build:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_BUILDKIT: "1"
  script:
    - echo "[docker] Multi-stage build..."
    - docker build --build-arg PYTHON_VERSION=${PYTHON_VERSION} --label "git.commit=${CI_COMMIT_SHA}" -t ${FULL_IMAGE} .
    - echo "[docker] Image built successfully"
    - docker save ${FULL_IMAGE} > image.tar
  artifacts:
    paths:
      - image.tar
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# Stage 5 - ECR Push (main only)
ecr-push:
  stage: push
  image: python:3.11-slim
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_VERIFY: 1
    DOCKER_CERT_PATH: "/certs/client"
  script:
    - apt-get update -qq && apt-get install -y docker-cli --quiet 2>/dev/null
    - pip install awscli --quiet
    - aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}
    - docker load < image.tar
    - echo "[ecr] Pushing ${FULL_IMAGE}..."
    - docker push ${FULL_IMAGE}
    - echo "[ecr] ECR push complete"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# Stage 6 - Terraform (main only)
terraform-plan:
  stage: iac
  rules:
    - when: never
  image:
    name: hashicorp/terraform:1.7
    entrypoint: [""]
  variables:
    TF_VAR_service_name: "${SERVICE_NAME}"
    TF_VAR_image_tag: "v1.0.0-${IMAGE_TAG}"
    TF_VAR_environment: "prod"
    TF_IN_AUTOMATION: "true"
  script:
    - cd terraform
    - terraform init -backend-config="bucket=zayo-poc-tf-state-${AWS_ACCOUNT_ID}-idp" -backend-config="key=${SERVICE_NAME}/${TF_WORKSPACE}/terraform.tfstate" -backend-config="region=${AWS_REGION}" -backend-config="dynamodb_table=zayo-poc-tf-locks" -input=false
    - terraform workspace select ${TF_WORKSPACE} || terraform workspace new ${TF_WORKSPACE}
    - terraform plan -out=tfplan -input=false
    - echo "[iac] Plan complete"
  artifacts:
    paths:
      - terraform/tfplan
    expire_in: 1 hour

terraform-apply:
  stage: iac
  rules:
    - when: never
  image:
    name: hashicorp/terraform:1.7
    entrypoint: [""]
  variables:
    TF_VAR_service_name: "${SERVICE_NAME}"
    TF_VAR_image_tag: "v1.0.0-${IMAGE_TAG}"
    TF_VAR_environment: "prod"
    TF_IN_AUTOMATION: "true"
  script:
    - cd terraform
    - terraform init -backend-config="bucket=zayo-poc-tf-state-${AWS_ACCOUNT_ID}-idp" -backend-config="key=${SERVICE_NAME}/${TF_WORKSPACE}/terraform.tfstate" -backend-config="region=${AWS_REGION}" -backend-config="dynamodb_table=zayo-poc-tf-locks" -input=false
    - terraform workspace select ${TF_WORKSPACE}
    - terraform apply -auto-approve -input=false tfplan
    - echo "[iac] Apply complete"
  needs:
    - terraform-plan


# Stage 8 - Notify (main only)
notify-deployment:
  stage: notify
  image: python:${PYTHON_VERSION}-slim
  script:
    - pip install requests --quiet
    - echo "[notify] Deployment complete for ${SERVICE_NAME} v1.0.0-${IMAGE_TAG}"
    - python3 scripts/fire-datadog-event.py --service "${SERVICE_NAME}" --env "prod" --version "v1.0.0-${IMAGE_TAG}" --committed-at "$(git log -1 --format=%ct ${CI_COMMIT_SHA})" --deployed-at "$(date +%s)" --pipeline-url "${CI_PIPELINE_URL}" || echo "[notify] Datadog event skipped"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

notify-failure:
  stage: notify
  image: python:${PYTHON_VERSION}-slim
  script:
    - pip install requests --quiet
    - python3 scripts/fire-datadog-event.py --service "${SERVICE_NAME}" --env "prod" --version "v1.0.0-${IMAGE_TAG}" --failed true --pipeline-url "${CI_PIPELINE_URL}" || echo "[notify] Datadog event skipped"
  when: on_failure
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
