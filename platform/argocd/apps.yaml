---
# Deploy order: apply this file FIRST
# idp-platform-ai must be live before spring-orders-poc
# pipeline calls it for SAST explanation
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: idp-platform-ai
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"   # deploys first
    idp.com/catalog-entity: "component:default/idp-platform-ai"
spec:
  project: default
  source:
    repoURL: "https://gitlab.com/idp/platform/idp-platform-ai.git"
    targetRevision: main
    path: helm
    helm:
      valueFiles: [values-prod.yaml]
  destination:
    server: "https://kubernetes.default.svc"
    namespace: platform-ai
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
    retry: { limit: 3, backoff: { duration: 30s, factor: 2, maxDuration: 3m } }

---
# Deploy order: apply this file SECOND
# Depends on idp-platform-ai being healthy
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spring-orders-poc
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"   # deploys second
    idp.com/catalog-entity: "component:default/spring-orders-poc"
spec:
  project: default
  source:
    repoURL: "https://gitlab.com/idp/orders/spring-orders-poc.git"
    targetRevision: main
    path: helm
    helm:
      valueFiles: [values-prod.yaml]
  destination:
    server: "https://kubernetes.default.svc"
    namespace: orders
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
    retry: { limit: 3, backoff: { duration: 30s, factor: 2, maxDuration: 3m } }
