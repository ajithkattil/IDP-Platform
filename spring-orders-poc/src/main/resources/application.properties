spring.application.name=spring-orders-poc
server.port=8080

# Actuator health endpoints for EKS probes
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.defaults.enabled=true

# Logging
logging.level.com.zayo=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Datadog APM (dd-java-agent injects these via env vars in EKS)
# DD_SERVICE, DD_ENV, DD_VERSION set via Helm values
