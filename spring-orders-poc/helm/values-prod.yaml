replicaCount: 1
image:
  repository: "123456789012.dkr.ecr.us-east-1.amazonaws.com/idp-poc/spring-orders-poc"
  tag: "v1.0.0-654d1689"
  pullPolicy: IfNotPresent
namespace: orders
service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
datadog:
  service: "spring-orders-poc"
  env: "poc"
  logsInjection: true
resources:
  requests: { cpu: "250m", memory: "512Mi" }
  limits:   { cpu: "1000m", memory: "1Gi" }
livenessProbe:
  httpGet: { path: /actuator/health/liveness, port: 8080 }
  initialDelaySeconds: 45
  periodSeconds: 15
readinessProbe:
  httpGet: { path: /actuator/health/readiness, port: 8080 }
  initialDelaySeconds: 30
  periodSeconds: 10
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/spring-orders-poc-pod-role"
ingress:
  enabled: false
strategy:
  type: RollingUpdate
  rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
