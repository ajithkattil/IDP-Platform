apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: java-spring-boot-service
  title: Java Spring Boot Service
  description: Production-ready Java 17 Spring Boot microservice with golden pipeline, Helm chart, Terraform infra and Backstage catalog entry
  tags:
    - java
    - spring-boot
    - eks
    - golden-path
    - recommended
spec:
  owner: platform-engineering
  type: service

  parameters:
    - title: Service details
      required:
        - service_name
        - owner_team
        - description
      properties:
        service_name:
          title: Service name
          type: string
          description: Lowercase, hyphens only e.g. payments-api
          pattern: '^[a-z][a-z0-9-]{2,48}[a-z0-9]$'
          ui:autofocus: true
        description:
          title: Description
          type: string
          description: Brief description of what this service does
        owner_team:
          title: Owner team
          type: string
          description: e.g. platform-engineering, orders-team, finance-eng
        system_name:
          title: System
          type: string
          description: The system this service belongs to e.g. order-fulfillment
          default: developer-platform

  steps:
    - id: fetch
      name: Fetch skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          service_name: ${{ parameters.service_name }}
          owner_team: ${{ parameters.owner_team }}
          description: ${{ parameters.description }}
          system_name: ${{ parameters.system_name }}
          java_package: ${{ parameters.service_name | replace("-", "") }}
          created_date: ${{ "" | now | date("YYYY-MM-DD") }}

    - id: publish
      name: Create GitLab repo
      action: publish:gitlab
      input:
        repoUrl: gitlab.com?owner=zayo-group/devops/idp-platform&repo=${{ parameters.service_name }}
        defaultBranch: main
        gitCommitMessage: "feat: initial scaffold by Zayo IDP"
        repoVisibility: private

    - id: register
      name: Register in Backstage catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: GitLab repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Backstage catalog entry
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
