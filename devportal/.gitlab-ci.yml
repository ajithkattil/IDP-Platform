stages:
  - build
  - docker-build

variables:
  ECR_REGISTRY: "501149494381.dkr.ecr.us-east-1.amazonaws.com"
  ECR_REPO: "zayo-poc/zayo-devportal"
  AWS_REGION: "us-east-1"

build:
  stage: build
  image: node:20-alpine
  script:
    - npm ci --include=dev
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

docker-build:
  stage: docker-build
  image: registry.gitlab.com/gitlab-org/cloud-deploy/aws-base:latest
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apt-get update -qq && apt-get install -y docker.io -qq
  script:
    - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
    - docker build -t $ECR_REGISTRY/$ECR_REPO:v1.0.0-$CI_COMMIT_SHORT_SHA .
    - docker push $ECR_REGISTRY/$ECR_REPO:v1.0.0-$CI_COMMIT_SHORT_SHA
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
